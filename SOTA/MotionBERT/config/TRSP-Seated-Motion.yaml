# feeder
feeder: feeder.feeder.Feeder
test_feeder_args:
  - name: TRSP-Seated-Motion
    data_path: ./data/Finetune/data_and_label_TRSP-Seated-Motion.pkl
    time_process:
      overlength: downsampling_uniform_offset
      underlength: upsampling_fill_zero

scale_range_train: [ 1, 3 ]
scale_range_test: [ 2, 2 ]
# model
backbone: model.DSTformer.DSTformer
backbone_args:
  dim_feat: 512
  mlp_ratio: 2
  depth: 5
  dim_rep: 512
  num_heads: 8
  att_fuse: True
  dim_in: 3
  dim_out: 3
  num_joints: 17
model: model.ActionNet.ActionNet
model_args:
  dim_rep: 512
  num_class: 4
  dropout_ratio: 0.5
  version: 'class'
  hidden_dim: 2048
  num_joints: 17

