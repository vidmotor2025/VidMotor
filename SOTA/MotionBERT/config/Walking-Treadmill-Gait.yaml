# feeder
feeder: feeder.feeder.Feeder
test_feeder_args:
  - name: Walking-Treadmill-Gait
    data_path: ./data/Finetune/data_and_label_Walking-Treadmill-Gait.pkl
    time_process:
      overlength: None
      underlength: None

scale_range_train: [ 1, 3 ]
scale_range_test: [ 2, 2 ]
# model
backbone: model.DSTformer.DSTformer
backbone_args:
  dim_feat: 512
  mlp_ratio: 2
  depth: 5
  dim_rep: 512
  num_heads: 8
  att_fuse: True
  dim_in: 3
  dim_out: 3
  num_joints: 17
model: model.ActionNet.ActionNet
model_args:
  dim_rep: 512
  num_class: 9
  dropout_ratio: 0.5
  version: 'class'
  hidden_dim: 2048
  num_joints: 17
