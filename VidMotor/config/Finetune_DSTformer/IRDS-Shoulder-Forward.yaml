# feeder
feeder: feeder.feeder_DSTformer.Feeder
test_feeder_args:
  - name: IRDS-Shoulder-Forward
    data_path: ./data/Finetune/data_and_label_IRDS-Shoulder-Forward.pkl
    time_process:
      overlength: downsampling_uniform_offset
      underlength: upsampling_fill_zero

scale_range_train: [ 1, 3 ]
scale_range_test: [ 2, 2 ]
# model
backbone: net.DSTformer.DSTFormer
backbone_args:
  dim_feat: 128
  mlp_ratio: 2
  depth: 5
  dim_rep: 512
  num_heads: 8
  att_fuse: True
  dim_in: 3
  dim_out: 3
  num_joints: 17
model: net.DSTformer.ActionNet_finetune
model_args:
  dim_rep: 512
  num_class: 2
  dropout_ratio: 0.5
  hidden_dim: 2048
  num_joints: 17
model_nc: net.DSTformer.NonCausalHead
model_nc_args:
  num_class: 2
